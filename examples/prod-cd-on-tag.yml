# Place this in an APP SOURCE repo at .github/workflows/prod-cd-tag.yml
# Fires on any pushed tag, but only bumps if the tag sits on the default branch.
name: prod CD (tag)

on:
  push:
    tags: ['**']

permissions: {}   # scoped per-job below

jobs:
  # Gate: only proceed when the tagged commit is reachable from the default branch.
  tag-branch-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # for checkout/fetch of the default branch
    outputs:
      is_default_branch: ${{ steps.check.outputs.is_default_branch }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need full history to test containment
      - id: check
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$DEFAULT_BRANCH"
          rc=0
          git merge-base --is-ancestor "$TAG_SHA" "origin/$DEFAULT_BRANCH" || rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "is_default_branch=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 1 ]; then
            echo "is_default_branch=false" >> "$GITHUB_OUTPUT"
          else
            # 128 etc. = a real git error; fail loudly instead of silently skipping the deploy.
            echo "::error::could not determine branch containment (git exit $rc)"
            exit "$rc"
          fi

  update-tags:
    needs: tag-branch-check
    if: needs.tag-branch-check.outputs.is_default_branch == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: GlueOps/github-actions-bump-deployment-tag@v0.0.0 # x-release-please-version
        with:
          ENV: prod
          CREATE_PR: true
          app-id: ${{ vars.GLUEOPS_DEPLOYMENT_APP_ID }}
          private-key: ${{ secrets.GLUEOPS_DEPLOYMENT_APP_PRIVATE_KEY }}
